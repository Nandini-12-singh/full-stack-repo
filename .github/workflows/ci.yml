name: CI

# ──────────────────────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel a previous in-progress run on the same branch / PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────────────────────
# Project info
#   • Framework  : Next.js 15 (App Router)
#   • Language   : TypeScript
#   • Runtime    : Node.js 22
#   • Package mgr: npm
#   • Backend    : Next.js API routes (no separate backend folder)
#   • Tests      : none configured — step is skipped gracefully
# ──────────────────────────────────────────────────────────────────────────────

jobs:

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  Step 1 — Install dependencies                                           │
  # │  Step 2 — Lint  (next lint / ESLint)                                     │
  # │  Step 3 — Type-check  (tsc --noEmit)                                     │
  # │  Step 4 — Build  (next build)                                            │
  # │  Step 5 — Test   (skipped — no test script found in package.json)        │
  # └──────────────────────────────────────────────────────────────────────────┘
  ci:
    name: Install → Lint → Type-check → Build
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js runtime ────────────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"           # caches ~/.npm between runs

      # ── 3. Install ────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci              # clean install — respects package-lock.json

      # ── 4. Lint ───────────────────────────────────────────────────────────
      - name: Lint (ESLint)
        run: npm run lint

      # ── 5. Type-check ─────────────────────────────────────────────────────
      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      # ── 6. Build ──────────────────────────────────────────────────────────
      # NEXT_PUBLIC_* vars must be present at build time (Next.js embeds them).
      # They are read from GitHub Actions secrets — never hardcoded here.
      # If the secrets are not yet configured, the build uses empty strings
      # (the app will still build; API calls will fail at runtime only).
      - name: Build (next build)
        env:
          NEXT_PUBLIC_OMDB_API_KEY: ${{ secrets.NEXT_PUBLIC_OMDB_API_KEY }}
          NEXT_PUBLIC_GEMINI_API_KEY: ${{ secrets.NEXT_PUBLIC_GEMINI_API_KEY }}
        run: npm run build

      # ── 7. Test ───────────────────────────────────────────────────────────
      # No test framework is configured in this project (package.json has no
      # "test" script). This step detects that and exits cleanly instead of
      # failing the pipeline.  Add Jest / Vitest later and this will auto-run.
      - name: Run tests (if available)
        run: |
          if npm run test --if-present 2>/dev/null; then
            echo "Tests passed."
          else
            echo "No test script found in package.json — skipping."
          fi

      # ── 8. Upload build artifact ──────────────────────────────────────────
      # Stores .next/ so the deploy workflow can download it without rebuilding.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: .next/
          retention-days: 3

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  Docker smoke test                                                        │
  # │  Verifies the Dockerfile builds successfully.                             │
  # │  Only runs on push to main — not on pull requests.                       │
  # └──────────────────────────────────────────────────────────────────────────┘
  docker:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_OMDB_API_KEY=${{ secrets.NEXT_PUBLIC_OMDB_API_KEY }} \
            --build-arg NEXT_PUBLIC_GEMINI_API_KEY=${{ secrets.NEXT_PUBLIC_GEMINI_API_KEY }} \
            --tag cineverse:${{ github.sha }} \
            .

      - name: Verify image was created
        run: docker image inspect cineverse:${{ github.sha }} --format "Image OK — {{.Id}}"
